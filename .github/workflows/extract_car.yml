name: Extract .car assets

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build cartool (from source, no Homebrew)
        shell: bash
        run: |
          set -euo pipefail

          echo "Cloning cartool..."
          git clone --depth 1 https://github.com/szwathub/cartool.git

          echo "Building cartool..."
          cd cartool
          make build

          CARTOOL_BIN="$(find build -type f -path "*/Products/Release/cartool" | head -n 1)"
          if [ -z "${CARTOOL_BIN}" ] || [ ! -f "${CARTOOL_BIN}" ]; then
            echo "cartool binary not found after build" >&2
            exit 1
          fi

          echo "Using cartool: ${CARTOOL_BIN}"
          sudo cp "${CARTOOL_BIN}" /usr/local/bin/cartool
          cartool -h || true

      - name: Extract all .car under input/
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "input" ]; then
            echo "input/ folder not found in repo root." >&2
            exit 1
          fi

          mkdir -p extracted

          mapfile -d '' files < <(find input -type f -name "*.car" -print0)
          echo "Found ${#files[@]} .car files"

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .car files found under input/." >&2
            exit 1
          fi

          for f in "${files[@]}"; do
            rel="${f#input/}"
            base="$(basename "$f" .car)"
            outdir="extracted/$(dirname "$rel")/$base"
            mkdir -p "$outdir"
            echo "==> $rel -> $outdir"
            cartool "$f" "$outdir"
          done

      - name: Zip results
        shell: bash
        run: |
          set -euo pipefail
          zip -r extracted_car_assets.zip extracted

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted_car_assets
          path: extracted_car_assets.zip
          if-no-files-found: error
