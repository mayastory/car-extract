name: Extract .car assets

on:
  workflow_dispatch:
    inputs:
      search_root:
        description: Folder to search .car files (relative path)
        required: true
        default: input
      name_filter:
        description: Find pattern (case-insensitive). Usually *.car
        required: true
        default: "*.car"

jobs:
  extract:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build cartool from source (no brew/tap)
        shell: bash
        run: |
          set -euo pipefail

          echo "Cloning cartool source..."
          rm -rf /tmp/cartool-src /tmp/cartool-build
          git clone --depth 1 https://github.com/steventroughtonsmith/cartool.git /tmp/cartool-src

          echo "Listing schemes/targets (info only)..."
          xcodebuild -list -project /tmp/cartool-src/cartool.xcodeproj || true

          echo "Building..."
          cd /tmp/cartool-src
          # Try scheme first, then fallback to target (some Xcode projects vary)
          if xcodebuild -project cartool.xcodeproj -scheme cartool -configuration Release -derivedDataPath /tmp/cartool-build build; then
            echo "Built with scheme."
          else
            echo "Scheme build failed, trying target build..."
            xcodebuild -project cartool.xcodeproj -target cartool -configuration Release -derivedDataPath /tmp/cartool-build build
          fi

          CARTOOL_BIN="$(find /tmp/cartool-build -type f -name cartool -perm -111 | head -n 1)"
          if [ -z "${CARTOOL_BIN}" ] || [ ! -x "${CARTOOL_BIN}" ]; then
            echo "ERROR: cartool binary not found after build."
            find /tmp/cartool-build -maxdepth 6 -type f | head -n 200 || true
            exit 1
          fi

          echo "cartool built at: ${CARTOOL_BIN}"
          echo "CARTOOL_BIN=${CARTOOL_BIN}" >> "$GITHUB_ENV"
          "${CARTOOL_BIN}" -h || true

      - name: Extract all .car
        id: extract_step
        shell: bash
        env:
          SEARCH_ROOT: ${{ inputs.search_root }}
          NAME_FILTER: ${{ inputs.name_filter }}
        run: |
          set -euo pipefail

          ROOT="${SEARCH_ROOT}"
          PATTERN="${NAME_FILTER}"

          if [ ! -d "$ROOT" ]; then
            echo "ERROR: search_root folder not found: $ROOT"
            exit 1
          fi

          mkdir -p extracted

          echo "Searching: ROOT=$ROOT / PATTERN=$PATTERN"
          mapfile -d '' files < <(find "$ROOT" -type f -iname "$PATTERN" -print0 || true)
          echo "Found .car files: ${#files[@]}"

          fail=0
          for f in "${files[@]}"; do
            rel="${f#$ROOT/}"
            stem="$(basename "$f")"
            stem="${stem%.*}"          # remove .car
            outdir="extracted/$(dirname "$rel")/${stem}"

            mkdir -p "$outdir"
            echo "==> $f -> $outdir"

            if "${CARTOOL_BIN}" "$f" "$outdir"; then
              :
            else
              echo "WARN: cartool failed for: $f"
              fail=1
            fi
          done

          echo "fail=$fail" >> "$GITHUB_OUTPUT"

          echo "Zipping extracted results..."
          rm -f extracted_car_assets.zip
          ditto -c -k --sequesterRsrc --keepParent extracted extracted_car_assets.zip
          ls -lah extracted_car_assets.zip

      - name: Upload artifact (zip)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extracted_car_assets
          path: extracted_car_assets.zip

      - name: Fail job if there were extraction errors
        if: steps.extract_step.outputs.fail == '1'
        shell: bash
        run: |
          echo "One or more .car files failed to extract (artifact still uploaded)."
          exit 1
